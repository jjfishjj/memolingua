<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MemoLingua · 生詞複習本 📅</title>
<meta name="description" content="訓練場遇到的生詞用間隔複習排程，答錯的字優先——練 → 記住 → 不忘的完整閉環。">
<style>
  :root{--primary:#0e3a36;--accent:#14b8a6;--ink:#0e3a36;--sub:#6b7280;--line:#e7eeec;--bg:#f3f8f7;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:520px;margin:0 auto;background:#fff;min-height:100vh;padding:0 20px 60px}
  h1{font-size:22px;margin:0}
  .muted{color:var(--sub);font-size:13px}
  .kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
  .kpi .b{border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .kpi .n{font-size:22px;font-weight:800;color:var(--primary)}.kpi .l{font-size:11px;color:var(--sub);margin-top:2px}
  .cardbox{border:1px solid var(--line);border-radius:20px;padding:30px 20px;margin-top:18px;text-align:center;min-height:200px;
    display:flex;flex-direction:column;justify-content:center;gap:14px}
  .en{font-size:34px;font-weight:800;color:var(--primary)}
  .zh{font-size:20px;color:#374151}
  .tap{font-size:13px;color:var(--sub)}
  .grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
  .g{padding:12px 4px;border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .g .sub{display:block;font-size:10px;opacity:.85;font-weight:400;margin-top:2px}
  .btn{display:inline-block;padding:12px 20px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none}
  .cta{display:block;text-align:center;padding:13px;border-radius:14px;background:#fff;color:var(--sub);border:1px solid var(--line);font-weight:500;font-size:14px;text-decoration:none;margin-top:10px}
  .empty{text-align:center;padding:40px 0;color:var(--sub)}
  .listbox{margin-top:16px}
  .word{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid #f3f4f6;font-size:13px}
  .word .en2{font-weight:700}.word .zh2{color:var(--sub)}
  .word .st{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:99px}
  .st.due{background:#fef2f2;color:#ef4444}.st.ok{background:#ecfdf5;color:#047857}
</style>
</head>
<body>
<div class="wrap">
  <div style="text-align:center;padding:30px 0 4px">
    <div style="font-size:42px">📅</div>
    <h1>生詞複習本</h1>
    <p class="muted">訓練場遇到的字都收在這，用間隔複習排程。<br>越快忘的字，越常出現——這就是不忘的關鍵。</p>
  </div>

  <div class="kpi">
    <div class="b"><div class="n" id="kDue">0</div><div class="l">待複習</div></div>
    <div class="b"><div class="n" id="kTotal">0</div><div class="l">總生詞</div></div>
    <div class="b"><div class="n" id="kMastered">0</div><div class="l">已熟練</div></div>
  </div>

  <div id="session"></div>

  <details style="margin-top:18px">
    <summary style="cursor:pointer;font-size:13px;font-weight:700;color:var(--accent)">📖 查看所有生詞</summary>
    <div class="listbox" id="allWords"></div>
  </details>

  <a class="cta" href="play.html">🎮 回訓練場繼續收集生詞</a>
  <a class="cta" href="index.html">← 回 MemoLingua 首頁</a>
</div>

<script>
const LS='ml_review_deck';
const load=()=>{ try{ return JSON.parse(localStorage.getItem(LS)||'{}'); }catch(e){ return {}; } };
const save=d=>{ try{ localStorage.setItem(LS,JSON.stringify(d)); }catch(e){} };
const DAY=86400000;
const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function speak(t){ if('speechSynthesis' in window){ const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; speechSynthesis.cancel(); speechSynthesis.speak(u); } }

let queue=[], cur=null, revealed=false;

/* SM-2 簡化版：依評分更新間隔、難易度、下次到期 */
function grade(card,q){   // q: 1忘了 2模糊 3記得 4秒答
  if(q===1){ card.reps=0; card.lapses=(card.lapses||0)+1; card.ease=Math.max(1.3,card.ease-0.2); card.interval=0; card.due=Date.now()+10*60000; }
  else{
    if(q===2){ card.ease=Math.max(1.3,card.ease-0.15); card.interval=Math.max(1,Math.round((card.interval||1)*1.2)); }
    else if(q===3){ card.interval = card.reps===0?1 : card.reps===1?3 : Math.round(card.interval*card.ease); }
    else { card.ease+=0.15; card.interval = card.reps===0?2 : Math.round(card.interval*card.ease*1.3)+1; }
    card.reps=(card.reps||0)+1;
    card.due=Date.now()+card.interval*DAY;
  }
  card.last=Date.now();
  return card;
}

function refreshKPI(){
  const d=load(), all=Object.values(d);
  document.getElementById('kDue').textContent=all.filter(c=>c.due<=Date.now()).length;
  document.getElementById('kTotal').textContent=all.length;
  document.getElementById('kMastered').textContent=all.filter(c=>(c.interval||0)>=14).length;  // 間隔 ≥14 天算熟練
  renderList(d);
}
function renderList(d){
  const all=Object.values(d).sort((a,b)=>a.due-b.due);
  document.getElementById('allWords').innerHTML=all.length?all.map(c=>{
    const due=c.due<=Date.now();
    return `<div class="word"><span class="en2">${esc(c.en)}</span><span class="zh2">${esc(c.zh||'—')}</span>
      <span class="st ${due?'due':'ok'}">${due?'待複習':(c.interval>=14?'熟練':c.interval+' 天後')}</span></div>`;
  }).join(''):'<p class="muted" style="font-size:13px;padding:8px 0">還沒有生詞。去訓練場玩「翻牌配對」「限時快答」就會開始收集。</p>';
}

function startSession(){
  const d=load();
  queue=Object.keys(d).filter(k=>d[k].due<=Date.now());
  if(!queue.length){ renderDone(); return; }
  nextCard();
}
function nextCard(){
  if(!queue.length){ renderDone(true); refreshKPI(); return; }
  cur=queue[0]; revealed=false; renderCard();
}
function renderCard(){
  const d=load(), c=d[cur];
  document.getElementById('session').innerHTML=`
    <div class="cardbox" id="cbox">
      <div class="en">${esc(c.en)} <span style="cursor:pointer;font-size:20px" onclick="speak('${esc(c.en)}')">🔊</span></div>
      ${revealed?`<div class="zh">${esc(c.zh||'（自己回想意思）')}</div>`:'<div class="tap">🤔 想一下意思，點卡片翻開</div>'}
    </div>
    ${revealed?`<div class="grades">
      <button class="g" style="background:#ef4444" onclick="doGrade(1)">忘了<span class="sub">10 分鐘後</span></button>
      <button class="g" style="background:#f59e0b" onclick="doGrade(2)">模糊<span class="sub">短間隔</span></button>
      <button class="g" style="background:#10b981" onclick="doGrade(3)">記得<span class="sub">拉長</span></button>
      <button class="g" style="background:#0ea5e9" onclick="doGrade(4)">秒答<span class="sub">大幅拉長</span></button>
    </div>`:`<div style="text-align:center;margin-top:14px"><button class="btn" onclick="reveal()">翻開答案</button></div>`}
    <p class="muted" style="text-align:center;margin-top:10px">剩 ${queue.length} 個待複習</p>`;
  document.getElementById('cbox').onclick=()=>{ if(!revealed)reveal(); };
}
function reveal(){ revealed=true; renderCard(); }
function doGrade(q){
  const d=load();
  d[cur]=grade(d[cur],q); save(d);
  queue.shift();
  refreshKPI();   // 即時更新頂部「待複習」數字
  nextCard();
}
function renderDone(justFinished){
  const d=load(), n=Object.keys(d).length;
  document.getElementById('session').innerHTML=`<div class="empty">
    <div style="font-size:44px">${n?'🎉':'📭'}</div>
    <p style="margin-top:8px">${n?(justFinished?'太棒了！今天的複習都完成了。':'目前沒有到期的生詞，晚點再回來～'):'複習本還是空的'}</p>
    <p class="muted">${n?'到期的字會依遺忘曲線再出現。':'去訓練場玩「翻牌配對」「限時快答」，遇到的字會自動收進來。'}</p>
    ${n?'':'<a class="btn" href="play.html" style="margin-top:12px">前往訓練場 →</a>'}
  </div>`;
}

refreshKPI();
startSession();
</script>
</body>
</html>
