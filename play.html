<style>
  :root{--primary:#0e3a36;--accent:#14b8a6;--ink:#0e3a36;--sub:#6b7280;--line:#e7eeec;--bg:#f3f8f7;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:660px;margin:0 auto;background:#fff;min-height:100vh;padding:0 18px 60px}
  h1{font-size:23px;margin:0}
  h2{font-size:17px;margin:0 0 4px}
  .muted{color:var(--sub);font-size:13px}
  .modeRow{display:flex;gap:6px;flex-wrap:wrap;position:sticky;top:0;background:#fff;padding:12px 0;z-index:10;border-bottom:1px solid var(--line)}
  .mchip{padding:6px 12px;border-radius:99px;border:1.5px solid var(--line);background:#fff;font-size:12px;cursor:pointer}
  .mchip.on{color:#fff;border-color:transparent}
  /* grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  .gcard{border:1px solid var(--line);border-radius:15px;padding:14px;cursor:pointer;transition:.15s;background:#fff;text-align:left}
  .gcard:hover{border-color:var(--accent);transform:translateY(-2px)}
  .gcard .ic{font-size:26px}
  .gcard b{display:block;font-size:14px;margin-top:5px}
  .gcard .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;color:#fff;margin-top:6px}
  /* player */
  .pbar{display:flex;align-items:center;gap:10px;position:sticky;top:0;background:#fff;padding:12px 0;z-index:10;border-bottom:1px solid var(--line)}
  #pBody{padding-top:14px}
  .btn{padding:11px 17px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--sub);border:1px solid var(--line);font-weight:600}
  .btn.accent{background:var(--accent)}
  .btn.sm{padding:7px 12px;font-size:12.5px}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  input[type=text],textarea{flex:1;min-width:120px;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:14px;font-family:inherit}
  textarea{width:100%;min-height:70px;resize:vertical}
  /* chat */
  .chatlog{max-height:300px;overflow-y:auto;margin-top:10px}
  .bub{max-width:88%;padding:9px 12px;border-radius:12px;font-size:13.5px;margin-top:6px;white-space:pre-wrap;word-break:break-word}
  .bub.ai{background:#f4faf9;margin-right:auto}
  .bub.me{background:#eef2f7;margin-left:auto}
  .bub b{color:#dc2626}
  .typing{font-size:12px;color:var(--sub);margin-top:6px;min-height:18px}
  /* generic */
  .tiles{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .tile{padding:8px 13px;border-radius:10px;border:2px solid var(--line);background:#fff;font-size:13px;cursor:pointer}
  .tile.sel{border-color:var(--accent);background:#e6faf6;font-weight:700}
  .tile.used{opacity:.35;pointer-events:none}
  .slot{font-size:22px;font-weight:800;color:var(--primary);min-height:30px}
  .result{margin-top:10px;padding:10px 12px;border-radius:10px;font-size:13.5px}
  .result.ok{background:#ecfdf5;color:#047857}
  .result.no{background:#fef2f2;color:#b91c1c}
  .result.info{background:#f8fafc;color:#334155}
  .word{font-size:28px;font-weight:800;text-align:center;margin:12px 0 6px}
  .gopts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .gopt{padding:14px;border-radius:12px;border:2px solid var(--line);background:#fff;font-size:20px;cursor:pointer;text-align:center}
  .timerbar{height:6px;background:#eef0f3;border-radius:99px;overflow:hidden;margin:8px 0}
  .timerbar>div{height:100%;background:var(--accent)}
  .score{font-size:13px;color:var(--sub);text-align:center;margin-top:6px}
  .pairbtn{padding:14px 20px;border-radius:12px;border:2px solid var(--line);background:#fff;font-size:17px;cursor:pointer;min-width:100px}
  .pairbtn.correct{border-color:#10b981;background:#ecfdf5}
  .pairbtn.wrong{border-color:#ef4444;background:#fef2f2}
  .twin{display:flex;gap:10px;margin-top:10px}
  .twincard{flex:1;text-align:center;padding:16px 8px;border-radius:14px;font-size:20px;font-weight:800;color:#fff}
  .hint{margin-top:10px;font-size:13.5px;background:#f8fafc;border-radius:10px;padding:10px 12px;display:none}
  table.mktable{width:100%;border-collapse:collapse;margin-top:10px}
  table.mktable td,table.mktable th{border:1px solid var(--line);padding:5px}
  table.mktable input{width:100%;border:none;font-size:12.5px;padding:4px}
  .messy{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:12.5px;margin-top:8px}
  .chipline{display:inline-block;font-size:12px;padding:3px 10px;border-radius:99px;background:#eef6f4;color:var(--primary);margin:3px 4px 0 0}
  /* memory palace */
  .room{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .spot{border:2px dashed var(--line);border-radius:12px;padding:12px 6px;text-align:center;font-size:12px;cursor:pointer;min-height:74px;display:flex;flex-direction:column;justify-content:center;gap:3px}
  .spot.filled{border-style:solid;border-color:var(--accent);background:#f0fdfa}
  .spot.active{border-color:#f59e0b;background:#fffbeb}
  .spot .pl{font-size:19px}
  .spot .it{font-weight:700;color:var(--primary)}
  /* highlighter */
  .hltext span{cursor:pointer;padding:1px 0;border-radius:3px}
  .hltext span.g{background:#bbf7d0}
  .hltext span.p{background:#fbcfe8}
  .hltext span.y{background:#fef08a}
  /* number code */
  .numtable{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}
  .numcell{border:1px solid var(--line);border-radius:9px;padding:7px 3px;text-align:center;font-size:11.5px}
  .numcell b{display:block;font-size:16px;color:var(--accent)}
  .bignum{font-size:34px;font-weight:800;letter-spacing:5px;text-align:center;margin:10px 0;color:var(--primary)}
  /* chain */
  .chainbox{border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:8px;min-height:46px}
  .chainitem{display:inline-block;background:#e6faf6;border:1px solid var(--accent);border-radius:8px;padding:5px 10px;font-size:12.5px;margin:3px}
  .arrow{color:var(--sub);margin:0 2px}
  .cta{display:block;text-align:center;padding:13px;border-radius:14px;background:#fff;color:var(--sub);border:1px solid var(--line);font-weight:500;font-size:14px;text-decoration:none;margin-top:10px}
  /* 天賦推薦 + 進度 */
  .tbanner{border-radius:16px;padding:15px;color:#fff;margin-top:14px}

  .prog{border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-top:10px;font-size:13px}
  .prog .timerbar{background:#eef0f3}
  .sechead{font-size:13px;font-weight:800;color:var(--primary);margin:16px 0 0}
  .gcard.rec{border-color:var(--accent);background:#f5fffd}
  .crown{position:absolute;top:8px;right:9px;font-size:14px}
  .gcard{position:relative}
  .playedtag{display:inline-block;font-size:10px;color:var(--sub);margin-top:4px}
  .setup-nudge{border:1px dashed var(--line);border-radius:14px;padding:13px 15px;margin-top:14px;font-size:13px;color:var(--sub)}
</style>

<script>
/* ================= 共用基礎 ================= */
const MODES={
 ai:{label:'AI 對話',emoji:'🤖',color:'#0ea5e9'},
 card:{label:'卡牌訓練',emoji:'🎴',color:'#8b5cf6'},
 game:{label:'小遊戲',emoji:'🎮',color:'#f59e0b'},
 sound:{label:'相似聲音',emoji:'🎵',color:'#ec4899'},
 similar:{label:'相似事物',emoji:'🔍',color:'#10b981'},
 tool:{label:'結構工具',emoji:'🛠️',color:'#64748b'}};

const SUPA_URL_REST='https://ycgjzrvfzaqaicvdtagq.supabase.co/rest/v1';
const CHAT_URL='https://ycgjzrvfzaqaicvdtagq.supabase.co/functions/v1/chat';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZ2p6cnZmemFxYWljdmR0YWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDgwMTcsImV4cCI6MjA5NTk4NDAxN30.cf15HuN44lbAqYWhjwM5M17l7U_tymEK-_ob8B8wNqQ';
const RETRYABLE=[429,500,502,503,504];

// Gemini 免費層偶爾短暫過載回 500/429，屬暫時性 → 自動重試，別讓使用者卡住。
async function streamChat(messages,settings,onDelta,onDone,onError,onRetry){
  const MAX_TRIES=3; let resp,lastErr='';
  for(let attempt=1;attempt<=MAX_TRIES;attempt++){
    const abort=new AbortController();
    const timeout=setTimeout(()=>abort.abort(),45000);
    try{
      resp=await fetch(CHAT_URL,{method:'POST',
        headers:{'Content-Type':'application/json',Authorization:'Bearer '+ANON},
        body:JSON.stringify({messages,settings}),signal:abort.signal});
      clearTimeout(timeout);
    }catch(e){ clearTimeout(timeout);
      lastErr=(e&&e.name==='AbortError')?'AI 逾時沒有回應':'無法連線到 AI 伺服器'; resp=null; }
    if(resp&&resp.ok&&resp.body)break;
    if(resp&&!RETRYABLE.includes(resp.status)){ onError('AI 服務錯誤 (HTTP '+resp.status+')'); return; }
    if(resp)lastErr='AI 服務忙碌 (HTTP '+resp.status+')';
    if(attempt<MAX_TRIES){ if(onRetry)onRetry(attempt,MAX_TRIES);
      await new Promise(r=>setTimeout(r,attempt*1500)); resp=null; }
  }
  if(!resp||!resp.ok||!resp.body){ onError(lastErr+'，請稍後再試一次。'); return; }
  const reader=resp.body.getReader(); const decoder=new TextDecoder(); let buf='';
  try{
    while(true){
      const {done,value}=await reader.read(); if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const parts=buf.split('\n\n'); buf=parts.pop();
      for(const p of parts){
        const line=p.trim(); if(!line.startsWith('data:'))continue;
        const payload=line.slice(5).trim();
        if(payload==='[DONE]'){ onDone(); return; }
        try{ const j=JSON.parse(payload);
          const d=j.choices&&j.choices[0]&&j.choices[0].delta&&j.choices[0].delta.content;
          if(d)onDelta(d);
        }catch(e){/* 忽略心跳/extra_content 片段 */}
      }
    }
    onDone();
  }catch(e){ onError('串流讀取中斷：'+e.message); }
}
const $=id=>document.getElementById(id);
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function styleCorr(t){
  return esc(t)
    .replace(/&lt;&lt;&lt;CORRECTION&gt;&gt;&gt;([\s\S]*?)&lt;&lt;&lt;END_CORRECTION&gt;&gt;&gt;/g,'<br><b>✏️ 修正：</b>$1')
    .replace(/&lt;&lt;&lt;SUGGESTION&gt;&gt;&gt;([\s\S]*?)&lt;&lt;&lt;END_SUGGESTION&gt;&gt;&gt;/g,'<br><b>💡 更自然：</b>$1');
}
const pick=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>{const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
function speak(text,rate){
  if(!('speechSynthesis' in window))return false;
  const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=rate||1;
  speechSynthesis.cancel(); speechSynthesis.speak(u); return true;
}
let audioCtx=null;
function beep(freq){
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value=freq||880;
    g.gain.setValueAtTime(.25,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.06);
    o.start(); o.stop(audioCtx.currentTime+.06);
  }catch(e){}
}

/* ========= AI 對話工廠：8 張 AI 卡共用同一套串流邏輯 ========= */
function aiMount(cfg){
  return function(el){
    el.innerHTML=`
      <p class="muted">${cfg.desc}</p>
      ${cfg.setup||''}
      <div class="chatlog" id="log"></div>
      <div class="typing" id="typing"></div>
      <div class="row" style="margin-top:8px"><button class="btn accent" id="startBtn">▶ ${cfg.startLabel||'開始'}</button></div>
      <div class="row" style="margin-top:8px;display:none" id="inputRow">
        <input type="text" id="inp" placeholder="${cfg.placeholder||'輸入你的回覆…'}">
        <button class="btn" id="sendBtn">送出</button>
      </div>`;
    let msgs=[], scenario='';
    const bub=(who,text)=>{
      const d=document.createElement('div'); d.className='bub '+who;
      d.innerHTML=(who==='ai'?'🤖 ':'🙋 ')+styleCorr(text);
      $('log').appendChild(d); $('log').scrollTop=$('log').scrollHeight; return d;
    };
    const settings=()=>({language:'english',scenario,difficulty:'intermediate',tone:cfg.tone||'casual',mode:'practice',speed:'normal'});
    function run(){
      let acc=''; const b=bub('ai','');
      $('typing').textContent='🤖 思考中…';
      streamChat(msgs,settings(),
        d=>{acc+=d; b.innerHTML='🤖 '+styleCorr(acc);},
        ()=>{ msgs.push({role:'assistant',content:acc}); $('typing').textContent='';
              $('inputRow').style.display='flex'; },
        e=>{ $('typing').textContent='⚠ '+e; $('startBtn').disabled=false; },
        (n,m)=>{ $('typing').textContent=`🤖 AI 忙碌中，重試 ${n}/${m}…`; });
    }
    $('startBtn').onclick=()=>{
      const err=cfg.validate?cfg.validate():null;
      if(err){ $('typing').textContent='⚠ '+err; return; }
      scenario=cfg.scenario();
      msgs=[{role:'user',content:cfg.kickoff||'開始，請照你的角色設定進行第一輪。'}];
      $('log').innerHTML=''; $('startBtn').disabled=true; run();
    };
    $('sendBtn').onclick=()=>{
      const v=$('inp').value.trim(); if(!v)return;
      bub('me',v); msgs.push({role:'user',content:v}); $('inp').value=''; run();
    };
    $('inp').onkeydown=e=>{ if(e.key==='Enter')$('sendBtn').onclick(); };
  };
}

 {role:'回到 1929 年的時空偵探',words:['crash','panic','invest','recover','warn']},

const EX=[
/* ---------- 🤖 AI 對話 × 9 ---------- */
{id:'hook',n:'情境鉤子卡',ic:'📍',mode:'ai',mount:(()=>{let w='';return aiMount({

{id:'feynman',n:'費曼原理卡',ic:'🧑‍🏫',mode:'ai',mount:(()=>{let t='';return aiMount({

  startLabel:'開始教學挑戰',placeholder:'用自己的話解釋…',tone:'casual',
  setup:`<div class="row" style="margin-top:8px"><span class="muted">主題：</span><span id="fmTopic" class="chipline"></span>
         <button class="btn ghost sm" onclick="(function(){var t=window.__pickTopic();document.getElementById('fmTopic').textContent=t;})()">🎲 換一個</button></div>`,
  scenario:()=>{ t=$('fmTopic').textContent;
    return `費曼原理卡遊戲：你扮演一個什麼都不懂、很愛問「為什麼」的學生。使用者要教你「${t}」。開場先說你完全不懂這個主題、請對方教你。之後每一輪都針對他的解釋連環追問：「為什麼？」「可以舉個例子嗎？」「那如果反過來呢？」。當他解釋得夠清楚時才說你懂了，並指出他哪個部分講得最好。全程用繁體中文，不要用英文。`;}

{id:'root',n:'字根字首拆解樹',ic:'🧩',mode:'card',mount(el){
  const PRE=['（無字首）','pre-','re-'],ROOT=['dict','port','spect'],SUF=['（無字尾）','-ion','-able'];
  const BANK={'predict':'預測（pre 事先 + dict 說）','prediction':'預測（名詞）','predictable':'可預測的',
    'report':'報告（re 再次 + port 帶／carry）','respect':'尊重（re 再 + spect 看）','portable':'可攜帶的（port 帶 + able 可以…的）',
    'dictation':'聽寫（dict 說 + ation）','spectable':'—','inspect':'—'};
  let sel={pre:'',root:'',suf:''};
  el.innerHTML=`<p class="muted">選字首（可不選）＋字根＋字尾（可不選），拼出真實單字。同一個字根能拼出好幾個字。</p>
    <p class="muted" style="margin:8px 0 0"><b>字首</b></p><div class="tiles" id="t1"></div>
    <p class="muted" style="margin:6px 0 0"><b>字根</b></p><div class="tiles" id="t2"></div>
    <p class="muted" style="margin:6px 0 0"><b>字尾</b></p><div class="tiles" id="t3"></div>
    <p class="muted" style="margin:12px 0 2px">你拼出的字：</p><div class="slot" id="slot">—</div>
    <div class="row" style="margin-top:8px"><button class="btn accent" id="chk">✓ 拼看看</button>
      <button class="btn ghost" id="rst">重置</button></div><div id="res"></div>`;
  const build=(id,list,key)=>{ $(id).innerHTML=list.map(t=>`<button class="tile" data-k="${key}" data-v="${t}">${t}</button>`).join(''); };
  build('t1',PRE,'pre'); build('t2',ROOT,'root'); build('t3',SUF,'suf');
  const upd=()=>{ const p=sel.pre&&sel.pre!=='（無字首）'?sel.pre.replace('-',''):'';
    const s=sel.suf&&sel.suf!=='（無字尾）'?sel.suf.replace('-',''):'';
    $('slot').textContent=sel.root?(p+sel.root+s):'—'; };
  el.querySelectorAll('.tile').forEach(b=>b.onclick=()=>{
    sel[b.dataset.k]=b.dataset.v;
    b.parentElement.querySelectorAll('.tile').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel'); upd(); });
  $('chk').onclick=()=>{ upd(); const w=$('slot').textContent;
    if(!sel.root){ $('res').innerHTML='<div class="result no">先選一個字根～</div>'; return; }
    $('res').innerHTML=(BANK[w]&&BANK[w]!=='—')
      ? `<div class="result ok">✅ <b>${w}</b> —— ${BANK[w]}</div>`
      : `<div class="result no">「${w}」不在這次字庫裡，換個組合試試（提示：pre+dict、re+port、re+spect、port+able 都通）</div>`; };
  $('rst').onclick=()=>{ sel={pre:'',root:'',suf:''};
    el.querySelectorAll('.tile').forEach(b=>b.classList.remove('sel'));
    $('slot').textContent='—'; $('res').innerHTML=''; };
}},
{id:'web',n:'概念織網卡',ic:'🕸️',mode:'card',mount(el){
  const POOL=['供需曲線','食物鏈','人際邊界','複利','免疫系統','塞車','記憶遺忘','城市交通','細胞分裂','市場競爭'];
  const cards=shuffle(POOL).slice(0,5);
  let picked=[],links=[];
  el.innerHTML=`<p class="muted">抽 5 張概念卡。點兩張把它們連起來，寫一句類比說明它們哪裡像——連得越跨域越好。</p>
    <div class="tiles" id="cw"></div>
    <div class="row" style="margin-top:10px"><input type="text" id="ana" placeholder="這兩個哪裡像？例如：都是越用越熟練…"><button class="btn accent" id="link">🔗 連起來</button></div>

    `<button class="tile${picked.includes(i)?' sel':''}" data-i="${i}">${c}</button>`).join('');
    el.querySelectorAll('#cw .tile').forEach(b=>b.onclick=()=>{
      const i=+b.dataset.i;

    let acc=''; $('fb').innerHTML='<div class="bub ai" id="fbb">🤖 </div>';
    streamChat([{role:'user',content:'請點評我建立的概念連結：\n'+body}],
      {language:'english',scenario:'概念織網卡：使用者用類比連結不相干的概念來建立記憶網。你要針對每一條連結，判斷這個類比邏輯站不站得住腳，給簡短點評（合理／有趣／太牽強），並針對最好的那一條說明為什麼它是好的記憶錨點。不要給標準答案，重點是鼓勵跨域連結。全程用繁體中文。',difficulty:'intermediate',tone:'casual',mode:'practice'},
      d=>{acc+=d; $('fbb').innerHTML='🤖 '+esc(acc);},
      ()=>{ $('typing').textContent=''; $('ai').disabled=false; },
      e=>{ $('typing').textContent='⚠ '+e; $('ai').disabled=false; },
      (n,m)=>{ $('typing').textContent=`🤖 忙碌中，重試 ${n}/${m}…`; });
  };
}},

{id:'chain',n:'知識地圖連連看',ic:'🗺️',mode:'card',mount(el){
  const SETS=[
   {t:'工業革命的因果鏈',items:['蒸汽機發明','工廠大量生產','農村人口湧入城市','都市化與勞工階級形成']},
   {t:'溫室效應的因果鏈',items:['燃燒化石燃料','大氣中二氧化碳增加','紅外線輻射被吸收','全球平均氣溫上升']},
   {t:'供需失衡的因果鏈',items:['原物料短缺','生產成本上升','商品售價提高','消費者需求下降']}];
  let set=pick(SETS), pool=shuffle(set.items), chain=[];
  const draw=()=>{
    $('pool').innerHTML=pool.map((it,i)=>`<button class="tile${chain.includes(it)?' used':''}" data-i="${i}">${it}</button>`).join('');
    el.querySelectorAll('#pool .tile').forEach(b=>b.onclick=()=>{
      const it=pool[+b.dataset.i]; if(chain.includes(it))return;
      chain.push(it); draw(); });
    $('chain').innerHTML=chain.length
      ? chain.map((c,i)=>`<span class="chainitem">${esc(c)}</span>${i<chain.length-1?'<span class="arrow">→</span>':''}`).join('')
      : '<span class="muted">點下方卡片，依「因為 A → 所以 B」的順序排出因果鏈</span>';
    $('chk').disabled=chain.length!==set.items.length;
  };
  el.innerHTML=`<p class="muted">把打散的知識點排成「因為 A，所以 B，最後 C」的因果鏈。排完對答案。</p>
    <div class="result info" style="margin-top:8px"><b>${set.t}</b></div>
    <div class="chainbox" id="chain"></div>
    <div class="tiles" id="pool"></div>
    <div class="row" style="margin-top:10px"><button class="btn accent" id="chk" disabled>✓ 對答案</button>
      <button class="btn ghost" id="rst">重排</button><button class="btn ghost" id="nx">換一組 →</button></div>
    <div id="res"></div>`;
  draw();
  $('chk').onclick=()=>{
    const ok=chain.every((c,i)=>c===set.items[i]);
    $('res').innerHTML=ok
      ? '<div class="result ok">✅ 完全正確！因果順序對了，這組知識就不用死背了。</div>'
      : `<div class="result no">❌ 順序不對。正確因果鏈：<br>${set.items.map((c,i)=>`${i+1}. ${esc(c)}`).join('<br>')}<br><span class="muted">看懂為什麼是這個順序，比背下來更重要。</span></div>`;
  };
  $('rst').onclick=()=>{ chain=[]; $('res').innerHTML=''; draw(); };
  $('nx').onclick=()=>{ const o=set; while(set===o)set=pick(SETS);
    pool=shuffle(set.items); chain=[]; $('res').innerHTML='';
    el.querySelector('.result.info').innerHTML='<b>'+set.t+'</b>'; draw(); };
}},
{id:'numcode',n:'數字轉碼訓練',ic:'🔢',mode:'card',mount(el){

{id:'gesture',n:'微動作記憶法指南',ic:'🤚',mode:'game',mount(el){
  const G=[['increase','⬆️ 手往上揮'],['decrease','⬇️ 手往下壓'],['reject','🙅 推開手勢'],['accept','🤝 握手'],
    ['stop','✋ 手掌張開'],['question','🤔 摸下巴'],['agree','👍 比讚'],['disagree','👎 比倒讚']];
  let st=null;
  el.innerHTML=`<p class="muted">把抽象詞綁定身體動作。看到詞彙，3 秒內選出對應手勢，8 題計分——真的有計時器在跑。</p>
    <div class="row" style="margin-top:8px"><button class="btn accent" id="start">▶ 開始挑戰（8 題）</button></div><div id="area"></div>`;
  const next=()=>{
    if(st.round>=st.total){
      $('area').innerHTML=`<div class="word">🏁 ${st.score} / ${st.total}</div>
        <p class="muted" style="text-align:center">${st.score>=6?'手勢反應超快！身體已經記住這些詞了。':'再玩一次，讓肌肉記憶接手。'}</p>`;
      recordPlay('gesture',{v:st.score,t:st.score+'/'+st.total});
      $('start').disabled=false; return;
    }
    st.round++;
    const correct=pick(G); let opts=[correct];
    while(opts.length<4){ const c=pick(G); if(!opts.includes(c))opts.push(c); }
    opts=shuffle(opts); st.correct=correct[0]; st.answered=false;
    $('area').innerHTML=`<div class="word">${correct[0]}</div>
      <div class="timerbar"><div id="tb" style="width:100%"></div></div>
      <div class="gopts">${opts.map(o=>`<button class="gopt" data-w="${o[0]}">${o[1]}</button>`).join('')}</div>
      <div class="score">第 ${st.round}/${st.total} 題 · 已得分 ${st.score}</div>`;
    el.querySelectorAll('.gopt').forEach(b=>b.onclick=()=>ans(b.dataset.w,b));
    const start=Date.now();
    clearInterval(st.timer);
    st.timer=setInterval(()=>{
      const left=Math.max(0,3000-(Date.now()-start));
      const bar=$('tb'); if(bar)bar.style.width=(left/3000*100)+'%';
      if(left<=0){ clearInterval(st.timer); if(!st.answered)ans(null,null); }
    },50);
  };
  const ans=(w,b)=>{
    if(st.answered)return; st.answered=true; clearInterval(st.timer);
    const ok=w===st.correct; if(ok)st.score++; else beep(220);
    el.querySelectorAll('.gopt').forEach(x=>{ x.style.opacity='.45';
      if(x.dataset.w===st.correct){x.style.opacity='1';x.style.borderColor='#10b981';} });
    if(b&&!ok)b.style.borderColor='#ef4444';
    setTimeout(next,700);
  };
  $('start').onclick=()=>{ $('start').disabled=true; st={round:0,score:0,total:8,timer:null}; next(); };
}},
{id:'palace',n:'記憶宮殿 3D 線上版',ic:'🏛️',mode:'game',mount(el){
  const SPOTS=['🚪 大門','👟 鞋櫃','🛋️ 沙發','📺 電視','🍚 冰箱','🚿 浴室','🛏️ 床頭','🪟 窗台','💡 檯燈'];
  const KNOW=[['H','氫'],['He','氦'],['Li','鋰'],['Be','鈹'],['B','硼'],['C','碳']];
  let placed={},phase='place',walkIdx=0,score=0,order=[];
  const draw=()=>{
    if(phase==='place'){
      const next=KNOW.find(k=>!Object.values(placed).includes(k[0]));
      el.innerHTML=`<p class="muted">把知識點放進熟悉空間的固定位置，之後在腦中「走一遍」就能取回。這是記憶宮殿的核心。</p>
        <div class="result info" style="margin-top:8px">${next?`把 <b>${next[0]}（${next[1]}）</b> 放到哪個位置？<br><span class="muted">想像一個誇張畫面，例如「氫氣球飄在大門口擋住你出門」</span>`:'✅ 全部放好了！'}</div>
        <div class="room">${SPOTS.map((s,i)=>`<div class="spot${placed[i]?' filled':''}" data-i="${i}">
          <div class="pl">${s.split(' ')[0]}</div><div>${s.split(' ')[1]}</div>
          ${placed[i]?`<div class="it">${placed[i]}</div>`:''}</div>`).join('')}</div>
        <div class="row" style="margin-top:10px">
          <button class="btn accent" id="walk" ${Object.keys(placed).length<KNOW.length?'disabled':''}>🚶 開始巡邏回想</button>
          <button class="btn ghost" id="rst">重放</button></div>
        <p class="muted" style="margin-top:6px">已放置 ${Object.keys(placed).length} / ${KNOW.length}</p>`;
      el.querySelectorAll('.spot').forEach(s=>s.onclick=()=>{
        const i=+s.dataset.i; if(placed[i])return;
        const nx=KNOW.find(k=>!Object.values(placed).includes(k[0])); if(!nx)return;
        placed[i]=nx[0]; draw(); });
      $('walk').onclick=()=>{ phase='walk'; walkIdx=0; score=0;
        order=Object.keys(placed).map(Number).sort((a,b)=>a-b); draw(); };
      $('rst').onclick=()=>{ placed={}; draw(); };
    }else if(phase==='walk'){
      const spotI=order[walkIdx];
      const opts=shuffle(KNOW.map(k=>k[0])).slice(0,4);
      if(!opts.includes(placed[spotI]))opts[0]=placed[spotI];
      el.innerHTML=`<p class="muted">在腦中走過每個位置，回想你放了什麼。</p>
        <div class="room">${SPOTS.map((s,i)=>`<div class="spot${i===spotI?' active':''}">
          <div class="pl">${s.split(' ')[0]}</div><div>${s.split(' ')[1]}</div></div>`).join('')}</div>
        <div class="result info" style="margin-top:10px">你走到 <b>${SPOTS[spotI]}</b>——這裡放了什麼？</div>
        <div class="gopts" style="margin-top:8px">${shuffle(opts).map(o=>`<button class="gopt" data-v="${o}" style="font-size:16px">${o}（${(KNOW.find(k=>k[0]===o)||[])[1]||''}）</button>`).join('')}</div>
        <div class="score">第 ${walkIdx+1}/${order.length} 站 · 答對 ${score}</div>`;
      el.querySelectorAll('.gopt').forEach(b=>b.onclick=()=>{
        if(b.dataset.v===placed[spotI])score++; else beep(220);
        walkIdx++;
        if(walkIdx>=order.length){ phase='done'; recordPlay('palace',{v:score,t:score+'/'+order.length}); }
        draw(); });
    }else{
      el.innerHTML=`<div class="word">🏁 ${score} / ${order.length}</div>
        <p class="muted" style="text-align:center">${score===order.length?'完美！這條路線已經是你的記憶硬碟了。':'漏掉的位置畫面不夠誇張——重放一次，把畫面加大。'}</p>
        <div class="row" style="justify-content:center;margin-top:10px"><button class="btn accent" id="again">🔄 清空路線，放新知識</button></div>`;
      $('again').onclick=()=>{ placed={}; phase='place'; draw(); };
    }
  };
  draw();
}},

{id:'highlight',n:'螢光色階與符號筆記術',ic:'🖍️',mode:'tool',mount(el){

    Object.entries(COLORS).forEach(([k,[n,use,c]])=>{
      const items=keys.filter(i=>marks[i]===k);
      if(items.length)h+=`<div style="margin-top:8px"><b style="background:${c};padding:1px 6px;border-radius:4px">${n}｜${use}</b><br>`
        +items.map(i=>'・'+esc(SENT[i])).join('<br>')+'</div>';
    });
    $('out').innerHTML=h+'</div>';
  };
  $('clr').onclick=()=>{ Object.keys(marks).forEach(k=>delete marks[k]);
    el.querySelectorAll('#tx span').forEach(s=>s.className=''); $('out').innerHTML=''; };
}},
{id:'pomodoro',n:'番茄鐘走讀與空間轉換術',ic:'🍅',mode:'tool',mount(el){
  const CORNERS=['🪟 窗台','🪑 書桌','🛏️ 床頭','🛋️ 沙發'];
  let subs=['','','',''],timer=null,left=0,mode='study',ci=0,running=false;
  el.innerHTML=`<p class="muted">把不同科目分配到房間不同角落，用「讀 20 分／走動 5 分」循環——移動時換角落，讓空間變成記憶的分類標籤。</p>
    <div id="setup">
      ${CORNERS.map((c,i)=>`<div class="row" style="margin-top:6px"><span style="width:76px;font-size:13px">${c}</span>
        <input type="text" class="sub" data-i="${i}" placeholder="放什麼科目？例如：英文單字"></div>`).join('')}
      <div class="row" style="margin-top:10px"><button class="btn accent" id="start">▶ 開始走讀循環</button></div>
      <p class="muted" style="margin-top:6px">至少填一個角落。（測試用：可改成 1 分鐘快速體驗）</p>
      <div class="row"><label class="muted"><input type="checkbox" id="fast"> 快速模式（1 分／15 秒）</label></div>
    </div>
    <div id="run" style="display:none"></div>`;
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const tick=()=>{
    left--;
    if(left<=0){
      beep(mode==='study'?520:880);
      if(mode==='study'){ mode='break'; left=$('fast').checked?15:5*60;
        ci=(ci+1)%subs.filter(Boolean).length; }
      else { mode='study'; left=$('fast').checked?60:20*60; }
    }
    render();
  };
  const render=()=>{
    const active=subs.filter(Boolean);
    const cur=CORNERS[subs.findIndex(s=>s===active[ci])];
    $('run').innerHTML=`
      <div class="word">${fmt(left)}</div>
      <div class="result ${mode==='study'?'ok':'info'}" style="text-align:center">
        ${mode==='study'?`📖 專注讀書中<br><b>${esc(cur)} ｜ ${esc(active[ci])}</b>`
          :`🚶 起來走動！<br>走到下一個角落：<b>${esc(CORNERS[subs.findIndex(s=>s===active[ci])])} ｜ ${esc(active[ci])}</b>`}
      </div>
      <div class="row" style="justify-content:center;margin-top:10px">
        <button class="btn ghost" id="stop">⏹ 結束循環</button></div>
      <div class="result info" style="margin-top:10px"><b>你的空間分類表</b><br>
        ${subs.map((s,i)=>s?`${CORNERS[i]} → ${esc(s)}`:'').filter(Boolean).join('<br>')}
        <br><span class="muted">複習時先想「我在哪個角落讀的」，用空間線索找回記憶。</span></div>`;
    $('stop').onclick=()=>{ clearInterval(timer); running=false;
      $('run').style.display='none'; $('setup').style.display='block'; };
  };
  $('start').onclick=()=>{
    subs=[...el.querySelectorAll('.sub')].map(i=>i.value.trim());
    if(!subs.filter(Boolean).length){ alert('至少填一個角落要讀什麼'); return; }
    ci=0; mode='study'; left=$('fast').checked?60:20*60; running=true;
    $('setup').style.display='none'; $('run').style.display='block';
    render(); clearInterval(timer); timer=setInterval(tick,1000);
  };
}}
];

/* 給 AI 卡的 setup 用的隨機工具 */
window.__pickTopic=()=>pick(TOPICS);
window.__pickMeme=()=>pick(MEME_ITEMS);

/* ================= 天賦 → 推薦訓練卡 ================= */
// 8 種記憶天賦各推薦 5 張最對症的卡（第一張是最該先練的）。
// key 與 scale.html 的 ARCH 一致，透過 ?talent=xxx 帶進來。
const TALENTS={
 img:{name:'影像造景師',emoji:'💠',color:'#6366F1',rec:['palace','imgremix','highlight','numcode','chain'],
   why:'你的大腦靠畫面記憶——先把知識變成可以「看見」的東西。'},
 snd:{name:'旋律獵人',emoji:'🎧',color:'#EC4899',rec:['rap','minimal','podcast','meme','story'],
   why:'你的大腦靠聲音記憶——先讓耳朵和節奏帶著你記。'},
 txt:{name:'邏輯解密者',emoji:'📑',color:'#10B981',rec:['root','chain','bug','table','feynman'],
   why:'你的大腦要先「懂為什麼」——先拆結構、找規則，再談記憶。'},
 act:{name:'戲劇行動派',emoji:'🎯',color:'#F59E0B',rec:['rp','hook','impromptu','gesture','pomodoro'],
   why:'你的大腦靠做過一次記住——直接進場景，別先背表。'},
 soc:{name:'圈粉教學家',emoji:'🗣️',color:'#06b6d4',rec:['feynman','podcast','impromptu','bug','story'],
   why:'你的大腦在「講出去」的瞬間才真的記住——先找對象輸出。'},
 sys:{name:'節奏工程師',emoji:'📈',color:'#8b5cf6',rec:['pomodoro','numcode','table','minimal','fixloop'],
   why:'你的大腦靠規律累積——先把節奏和系統建起來，複利自己會滾。'},
 cre:{name:'腦洞煉金師',emoji:'✨',color:'#f43f5e',rec:['imgremix','meme','web','story','palace'],
   why:'你的大腦靠聯想記憶——越荒謬的連結，記得越牢。'},
 biz:{name:'目標狙擊手',emoji:'💼',color:'#0ea5e9',rec:['impromptu','fixloop','podcast','rp','bug'],
   why:'你的大腦要看到靶心才開火——每次練習都要有可驗收的成果。'}};

// 從網址帶進來的天賦（scale.html 報告頁的「開始專屬訓練」會帶 ?talent=）
// 記進 localStorage，之後直接開 play.html 也能延續推薦。
const LS_TALENT='ml_talent', LS_LOG='ml_play_log';
function currentTalent(){
  const p=new URLSearchParams(location.search).get('talent');
  if(p&&TALENTS[p]){ try{localStorage.setItem(LS_TALENT,p);}catch(e){} return p; }
  try{ const s=localStorage.getItem(LS_TALENT); if(s&&TALENTS[s])return s; }catch(e){}
  return null;
}

/* ================= 練習紀錄（localStorage） ================= */
function loadLog(){ try{ return JSON.parse(localStorage.getItem(LS_LOG)||'{}'); }catch(e){ return {}; } }
function saveLog(l){ try{ localStorage.setItem(LS_LOG,JSON.stringify(l)); }catch(e){} }
// 匿名回報訓練行為給後台（fire-and-forget：失敗絕不影響使用者練習）
// 只送卡片 id / 形式 / 天賦 / 分數——沒有 email、姓名或任何個資。
function logEvent(id,event,score){
  try{
    const e=EX.find(x=>x.id===id);
    fetch(SUPA_URL_REST+'/play_events',{method:'POST',
      headers:{apikey:ANON,Authorization:'Bearer '+ANON,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify({exercise_id:id,mode:e?e.mode:null,talent:currentTalent(),
        event,score_v:score?score.v:null,score_t:score?score.t:null,source:'github-pages'})
    }).catch(()=>{});   // 後台還沒建表也無所謂，靜默忽略
  }catch(e){}
}
// 記一次練習：次數 +1、更新最後練習時間、保留最佳成績
function recordPlay(id,score){
  const l=loadLog(); const r=l[id]||{n:0};
  r.n++; r.last=Date.now();
  if(score&&(!r.best||score.v>r.best.v)) r.best={v:score.v,t:score.t};
  l[id]=r; saveLog(l); refreshProgress();
  logEvent(id,score?'complete':'open',score);
}
window.recordPlay=recordPlay;
function refreshProgress(){
  const l=loadLog(); const done=EX.filter(e=>l[e.id]).length;
  const el=$('progress'); if(!el)return;
  const pct=Math.round(done/EX.length*100);
  el.innerHTML=`<div class="row" style="justify-content:space-between">
      <span><b>已練 ${done} / ${EX.length}</b> 張</span>
      <span class="muted">${pct}%</span></div>
    <div class="timerbar" style="margin:6px 0 0"><div style="width:${pct}%"></div></div>
    ${done?`<div class="muted" style="margin-top:6px">${
      EX.filter(e=>l[e.id]&&l[e.id].best).map(e=>`${e.ic} ${e.n} 最佳 ${l[e.id].best.t}`).join('　·　')||'繼續練，成績會記在這裡'
    }</div>`:'<div class="muted" style="margin-top:6px">練過的卡會記錄在這裡，成績會留下最佳紀錄</div>'}`;
}

/* ================= 選單 / 路由 ================= */
let activeMode='all';
function renderModes(){
  const all=[['all',{label:'全部',emoji:'🗂️',color:'#0e3a36'}]].concat(Object.entries(MODES));
  $('modeRow').innerHTML=all.map(([k,m])=>{
    const n=k==='all'?EX.length:EX.filter(e=>e.mode===k).length;
    return `<button class="mchip${k===activeMode?' on':''}" data-k="${k}" style="${k===activeMode?'background:'+m.color:''}">${m.emoji} ${m.label} ${n}</button>`;
  }).join('');
  $('modeRow').querySelectorAll('.mchip').forEach(b=>b.onclick=()=>{ activeMode=b.dataset.k; renderModes(); renderGrid(); });
}
function cardHTML(e,isRec){
  const m=MODES[e.mode], l=loadLog(), r=l[e.id];
  return `<button class="gcard${isRec?' rec':''}" data-id="${e.id}">
    ${isRec?'<span class="crown">👑</span>':''}
    <span class="ic">${e.ic}</span><b>${e.n}</b>
    <span class="badge" style="background:${m.color}">${m.emoji} ${m.label}</span>
    ${r?`<span class="playedtag">✓ 練過 ${r.n} 次${r.best?' · 最佳 '+r.best.t:''}</span>`:''}
  </button>`;
}
function renderTalent(){
  const t=currentTalent(), box=$('talentBanner');
  if(!t){
    box.innerHTML=`<div class="setup-nudge">🎯 還不知道自己是哪型？
      <a href="scale.html" style="color:var(--accent);font-weight:700">先做 2 分鐘記憶天賦測驗 →</a>
      測完這裡會自動推薦最適合你的訓練卡。</div>`;
    return;
  }
  const T=TALENTS[t];
  box.innerHTML=`<div class="tbanner" style="background:linear-gradient(135deg,${T.color}cc,${T.color})">
    <div class="h"><span style="font-size:26px">${T.emoji}</span>
      <div><b>你的天賦：${T.name}</b><div class="why">${T.why}</div></div></div>
  </div>`;
}
function renderGrid(){
  const t=currentTalent();
  const recIds=t?TALENTS[t].rec:[];
  const list=activeMode==='all'?EX:EX.filter(e=>e.mode===activeMode);
  let html='';
  // 只在「全部」時把推薦卡拉到最上面，避免跟形式篩選打架
  if(t&&activeMode==='all'){
    const recs=recIds.map(id=>EX.find(e=>e.id===id)).filter(Boolean);
    html+=`<div class="sechead" style="grid-column:1/-1">👑 為你推薦（照順序練最有效）</div>`;
    html+=recs.map(e=>cardHTML(e,true)).join('');
    html+=`<div class="sechead" style="grid-column:1/-1">其餘訓練卡</div>`;
    html+=list.filter(e=>!recIds.includes(e.id)).map(e=>cardHTML(e,false)).join('');
  }else{
    html=list.map(e=>cardHTML(e,recIds.includes(e.id))).join('');
  }
  $('grid').innerHTML=html;
  $('grid').querySelectorAll('.gcard').forEach(b=>b.onclick=()=>open(b.dataset.id));
}
function open(id){
  const e=EX.find(x=>x.id===id); if(!e)return;
  const m=MODES[e.mode];
  $('pTitle').textContent=e.ic+' '+e.n;
  $('pBadge').textContent=m.emoji+' '+m.label; $('pBadge').style.background=m.color;
  $('gridView').style.display='none'; $('playView').style.display='block';
  $('pBody').innerHTML=''; e.mount($('pBody'));
  recordPlay(id);                       // 開啟即記一次；有計分的卡完成時會再存最佳成績
  window.scrollTo(0,0); location.hash=id;
}
function backToGrid(){
  try{ speechSynthesis.cancel(); }catch(e){}
  $('pBody').innerHTML='';                       // 卸載，順便停掉裡面的 timer/串流 UI
  $('playView').style.display='none'; $('gridView').style.display='block';
  location.hash=''; window.scrollTo(0,0);
  renderTalent(); refreshProgress(); renderGrid();  // 回到選單時刷新紀錄
}
renderTalent(); renderModes(); renderGrid(); refreshProgress();
if(location.hash){ const id=location.hash.slice(1); if(EX.find(x=>x.id===id))open(id); }
// 支援從課表/報告用 #id 直接開卡（同頁換 hash 不會重載，所以要監聽）
window.addEventListener('hashchange',()=>{
  const id=location.hash.slice(1);
  if(id&&EX.find(x=>x.id===id))open(id); else if(!id)backToGrid();
});
</script>
