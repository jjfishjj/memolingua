name: Keep Supabase project alive

# Supabase free-tier projects auto-pause after 7 days with no API traffic.
# This already happened once (July 2026) and broke login/chat/the funnel
# until manually restored. A daily ping keeps the project counted as active.
on:
  schedule:
    - cron: '0 3 * * *'   # daily 03:00 UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth health endpoint
        run: |
          # Public anon key — already embedded in the client bundles this repo ships,
          # safe to commit. This call only proves reachability, no data is touched.
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZ2p6cnZmemFxYWljdmR0YWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDgwMTcsImV4cCI6MjA5NTk4NDAxN30.cf15HuN44lbAqYWhjwM5M17l7U_tymEK-_ob8B8wNqQ"
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://ycgjzrvfzaqaicvdtagq.supabase.co/auth/v1/health" \
            -H "apikey: $ANON")
          echo "Supabase auth health responded: HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Supabase project did not respond with 200 (got $code) — it may be paused or the anon key may have rotated."
          fi
